services:
  # Web Service
  - type: web
    name: ecomprj
    env: python
    plan: free
    buildCommand: "pip install -r requirements.txt && chmod +x start.sh"
    startCommand: "./start.sh"
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: ecomprj.production
      - key: PYTHON_VERSION
        value: 3.11.0
    autoDeploy: true
    
  # PostgreSQL Database
  - type: pserv
    name: ecomprj-db
    env: postgres
    plan: free
    user: ecomprj_user
    database: ecomprj_db
    ipAllowList: []
